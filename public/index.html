<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿罗娜の共享画廊 🎀</title>
    <style>
        :root {
            --main-blue: #4A90E2;
            --light-blue: #E8F1FF;
            --dark-blue: #357ABD;
            --shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "PingFang SC","微软雅黑",sans-serif; }
        body {
            background: linear-gradient(135deg, #2b4162 0%, #f9f9f9 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1000px;
        }
        h1 { text-align: center; color: var(--main-blue); margin-bottom: 20px; }
        .upload-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-btn {
            padding: 12px 30px;
            background: var(--main-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .upload-btn:hover { background: var(--dark-blue); transform: translateY(-2px); }
        #fileInput { display: none; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .card .download-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="glass">
        <h1>✨ 阿罗娜的群友画廊</h1>
        <div class="upload-area">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                📤 上传你的美图
            </button>
            <p style="margin-top:10px; font-size:0.9rem; color:#666;">支持 JPG/PNG/GIF/WebP，大小不超过 10MB</p>
        </div>
        <div id="gallery" class="gallery">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();
                if (data.url) {
                    alert('✅ 上传成功！刷新图库...');
                    loadGallery();
                } else {
                    alert('❌ 上传失败：' + (data.error || '未知错误'));
                }
            } catch (err) {
                alert('网络错误，请稍后再试');
            }
            fileInput.value = '';
        });

        async function loadGallery() {
            try {
                const res = await fetch('/api/list');
                const images = await res.json();
                
                if (images.length === 0) {
                    gallery.innerHTML = '<div class="loading">还没有图片哦，快来上传第一张吧 📸</div>';
                    return;
                }

                gallery.innerHTML = images.map(img => `
                    <div class="card">
                        <img src="${img.url}" alt="${img.name}" loading="lazy">
                        <a href="${img.url}" download class="download-btn" title="下载原图">
                            ⬇️ 下载
                        </a>
                    </div>
                `).join('');
            } catch (err) {
                gallery.innerHTML = '<div class="loading">加载失败，请刷新页面</div>';
            }
        }

        loadGallery();
    </script>
</body>
</html>
